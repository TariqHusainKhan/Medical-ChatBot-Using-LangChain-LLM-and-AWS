<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MediBot — Clinical Reference Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#06120E;
    --bed:#0B1F17;
    --ridge:#12312454;
    --line:#1D4635;
    --mint:#5CF2A8;
    --mint-dim:#2E8A62;
    --bone:#E8F2EC;
    --muted:#7DA192;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--abyss);
    color:var(--bone);
    font-family:'Inter',system-ui,sans-serif;
    display:flex;justify-content:center;
    padding:24px 16px;
  }
  .shell{
    width:100%;max-width:820px;height:calc(100vh - 48px);
    display:flex;flex-direction:column;
    background:var(--bed);
    border:1px solid var(--line);
    border-radius:4px;
    overflow:hidden;
  }

  /* ---- header: reads like an instrument panel ---- */
  header{
    padding:20px 24px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:baseline;gap:14px;
    background:linear-gradient(180deg,#0E2A1F,var(--bed));
  }
  h1{
    font-family:'Fraunces',serif;
    font-size:22px;font-weight:600;letter-spacing:-.01em;
  }
  h1 em{color:var(--mint);font-style:normal}
  .src{
    font-family:'JetBrains Mono',monospace;
    font-size:10.5px;color:var(--muted);
    letter-spacing:.08em;text-transform:uppercase;
    margin-left:auto;
  }
  .pulse{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--mint);margin-right:6px;
    animation:beat 2.4s ease-in-out infinite;
  }
  @keyframes beat{0%,100%{opacity:1}50%{opacity:.25}}

  /* ---- transcript ---- */
  #log{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column;gap:22px}
  #log::-webkit-scrollbar{width:8px}
  #log::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}

  .turn{max-width:88%;animation:rise .32s ease both}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .turn .tag{
    font-family:'JetBrains Mono',monospace;
    font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--muted);margin-bottom:7px;
  }
  .turn .body{
    padding:13px 16px;border-radius:3px;
    font-size:14.5px;line-height:1.65;
  }

  .you{align-self:flex-end;text-align:right}
  .you .body{
    background:var(--ridge);
    border:1px solid var(--line);
    text-align:left;
  }

  .bot .tag{color:var(--mint-dim)}
  .bot .body{
    background:transparent;
    border-left:2px solid var(--mint);
    padding-left:16px;border-radius:0;
    color:var(--bone);
  }

  /* the one flourish: a retrieval readout, because that's what RAG does */
  .thinking .body{
    border-left-color:var(--mint-dim);
    font-family:'JetBrains Mono',monospace;
    font-size:11.5px;color:var(--muted);letter-spacing:.04em;
  }
  .thinking .body::after{
    content:'';animation:dots 1.4s steps(4,end) infinite;
  }
  @keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}

  .empty{
    margin:auto;text-align:center;color:var(--muted);
    max-width:400px;
  }
  .empty p:first-child{
    font-family:'Fraunces',serif;font-size:17px;
    color:var(--bone);margin-bottom:8px;
  }
  .empty p:last-child{font-size:13.5px;line-height:1.6}

  /* ---- composer ---- */
  form{
    border-top:1px solid var(--line);
    padding:16px 20px;display:flex;gap:12px;align-items:center;
    background:var(--bed);
  }
  input{
    flex:1;background:var(--abyss);
    border:1px solid var(--line);border-radius:3px;
    padding:12px 14px;color:var(--bone);
    font-family:inherit;font-size:14.5px;
    outline:none;transition:border-color .18s;
  }
  input::placeholder{color:var(--muted)}
  input:focus{border-color:var(--mint-dim)}
  button{
    background:var(--mint);color:var(--abyss);
    border:none;border-radius:3px;
    padding:12px 22px;cursor:pointer;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;font-weight:500;
    letter-spacing:.08em;text-transform:uppercase;
    transition:background .18s;
  }
  button:hover:not(:disabled){background:#7FF7BE}
  button:disabled{background:var(--mint-dim);cursor:not-allowed;opacity:.5}
  :focus-visible{outline:2px solid var(--mint);outline-offset:2px}

  .note{
    font-family:'JetBrains Mono',monospace;
    font-size:9.5px;color:var(--muted);
    text-align:center;padding:0 20px 14px;
    letter-spacing:.06em;background:var(--bed);
  }

  @media(max-width:560px){
    body{padding:0}
    .shell{height:100vh;border:none;border-radius:0}
    .turn{max-width:96%}
    .src{display:none}
  }
  @media(prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <h1>Medi<em>Bot</em></h1>
    <span class="src"><span class="pulse"></span>Gale Encyclopedia · 384-d index</span>
  </header>

  <div id="log">
    <div class="empty" id="empty">
      <p>Ask about a condition, symptom, or treatment.</p>
      <p>Answers are retrieved from the Gale Encyclopedia of Medicine and grounded in its text — not generated from memory.</p>
    </div>
  </div>

  <form id="composer">
    <input id="q" autocomplete="off" placeholder="What is acromegaly?" required>
    <button type="submit" id="send">Ask</button>
  </form>
  <div class="note">Reference tool for study. Not a substitute for a clinician.</div>
</div>

<script>
const log=document.getElementById('log');
const form=document.getElementById('composer');
const q=document.getElementById('q');
const send=document.getElementById('send');

function turn(who,tag,text,cls=''){
  const d=document.createElement('div');
  d.className='turn '+who+' '+cls;
  d.innerHTML=`<div class="tag">${tag}</div><div class="body"></div>`;
  d.querySelector('.body').textContent=text;
  log.appendChild(d);
  log.scrollTop=log.scrollHeight;
  return d;
}

form.addEventListener('submit',async e=>{
  e.preventDefault();
  const text=q.value.trim();
  if(!text)return;

  const empty=document.getElementById('empty');
  if(empty)empty.remove();

  turn('you','You',text);
  q.value='';
  send.disabled=true;

  const wait=turn('bot','Retrieving','searching index');
  wait.classList.add('thinking');

  try{
    const r=await fetch('/get',{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({msg:text})
    });
    const answer=await r.text();
    wait.remove();
    turn('bot','MediBot',answer);
  }catch(err){
    wait.remove();
    turn('bot','Error','Could not reach the server. Check that Flask is running and try again.');
  }finally{
    send.disabled=false;
    q.focus();
  }
});
</script>
</body>
</html>
